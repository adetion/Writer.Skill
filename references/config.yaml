# Writer Skill Configuration File
# All numerical values are in tokens, adjustable based on the context window size of the model in use

# Single API Call Configuration
max_input_tokens: 24576 # Input token upper limit, default 24k (75% of a 32k context model). Leave empty to auto-adapt to current model.
max_output_tokens: 2048 # Output token upper limit, default 2k (approximately 1500–2000 Chinese characters). Leave empty to auto-adapt to current model.
safety_threshold: 0.8 # Total token safety threshold, must not exceed 80% of the model's limit

# Context Configuration
context_chunks: 2 # Number of recent scene blocks to retain when generating new content
knowledge_chunk_size: 4096 # Maximum token count returned per knowledge base retrieval

# Path Configuration
work_dir: "./novel_workspace" # Root directory for storing created content
knowledge_dir: "./novel_knowledge" # Knowledge base storage directory
log_dir: "./logs" # Log storage directory
state_file: "./novel_workspace/novel_state.json" # State file name

# Generation Configuration
chapter_split_size: 1000 # Target word count (Chinese characters) per scene block
min_chapter_words: 8000 # Minimum word count per chapter
max_retry_count: 3 # Number of retries after token overflow failure
